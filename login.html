<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to Bismillah Chicken Centre">
    <title>Login | Bismillah Chicken Centre</title>
    <link rel="icon" type="image/png"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍗</text></svg>">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
</head>

<body class="light-theme">
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="nav-logo"><span class="logo-icon">🍗</span><span>Bismillah Chicken</span></a>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
                <li><a href="order.html" class="nav-link">Order Now</a></li>
            </ul>
            <div class="nav-actions">
                <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle Theme"><span
                        class="theme-icon">🌙</span></button>
                <button class="cart-btn">🛒<span class="cart-badge" style="display:none;">0</span></button>
            </div>
            <div class="nav-toggle"><span></span><span></span><span></span></div>
        </div>
    </nav>

    <section class="auth-section">
        <div class="container">
            <div class="auth-card glass-card animate-on-scroll">
                <div class="auth-header">
                    <h1>Welcome Back! 👋</h1>
                    <p>Login to your Bismillah Chicken Centre account</p>
                </div>

                <form id="login-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label">Phone Number *</label>
                        <input type="tel" name="phone" class="form-input" placeholder="Enter your phone number"
                            required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password *</label>
                        <input type="password" name="password" class="form-input" placeholder="Enter your password"
                            required minlength="6">
                    </div>

                    <button type="submit" class="btn btn-primary" style="width:100%;padding:1rem;font-size:1.1rem;">
                        Login 🔐
                    </button>
                </form>

                <div class="auth-footer">
                    <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer" style="margin-top:auto;">
        <div class="container">
            <div class="footer-bottom">
                <p>© 2024 Bismillah Chicken Centre. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <div class="cart-overlay"></div>
    <div class="cart-sidebar">
        <div class="cart-header">
            <h3>🛒 Cart</h3><button class="cart-close">✕</button>
        </div>
        <div class="cart-items"></div>
        <div class="cart-footer">
            <div class="cart-total"><span>Total:</span><span class="cart-total-value">₹0</span></div>
            <div class="cart-actions">
                <a href="order.html" class="btn btn-primary">Checkout</a>
            </div>
        </div>
    </div>

    <a href="https://wa.me/918688235701" class="whatsapp-float">💬</a>
    <div class="toast-container"></div>

    <script src="js/main.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const form = e.target;
            const phone = form.phone.value;
            const password = form.password.value;

            const btn = form.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Logging in...';

            const result = await login(phone, password);

            if (result.success) {
                window.location.href = 'index.html';
            } else {
                btn.disabled = false;
                btn.textContent = 'Login 🔐';
            }
        }
    </script>
</body>

</html>
